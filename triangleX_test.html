<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRIANGLE X 全等召喚 - 完整版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 MQTT.js 客戶端 -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f1527 0%, #1a1033 100%);
      color: white;
      font-family: sans-serif;
      overflow-x: hidden;
    }
    .esports-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-style: italic;
      transform: skewX(-5deg);
      animation: esportsSyncPulse 1.5s ease-in-out infinite alternate;
    }
    @keyframes esportsSyncPulse {
      0% { color: #e0ffff; text-shadow: 0 0 5px #fff, 0 0 10px #00f3ff, 0 0 20px #00f3ff, 0 0 40px #00f3ff; }
      50% { color: #ffe0ff; text-shadow: 0 0 5px #fff, 0 0 10px #bf00ff, 0 0 20px #bf00ff, 0 0 40px #bf00ff; }
      100% { color: #ffe0e0; text-shadow: 0 0 5px #fff, 0 0 10px #ff003c, 0 0 20px #ff003c, 0 0 40px #ff003c; }
    }
    .glass-panel {
      background: linear-gradient(135deg, rgba(13, 17, 23, 0.85) 0%, rgba(28, 25, 52, 0.85) 100%);
      border: 1px solid rgba(123, 97, 255, 0.4);
      box-shadow: 0 0 20px rgba(76, 0, 255, 0.2);
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
    canvas {
      background: linear-gradient(145deg, rgba(10, 14, 32, 0.7) 0%, rgba(20, 30, 60, 0.7) 100%);
      border: 1px solid #4361ee;
      border-radius: 8px;
    }
    .btn-primary {
      background: linear-gradient(145deg, #4f46e5 0%, #3730a3 100%);
      color: white;
      transition: all 0.2s;
    }
    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(145deg, #6366f1 0%, #4338ca 100%);
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
      transform: translateY(-2px);
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .opponent-area { opacity: 0.3; pointer-events: none; filter: grayscale(80%); }
    
    /* 階段切換動畫 */
    .phase-overlay {
      background: rgba(10, 14, 32, 0.95);
      backdrop-filter: blur(15px);
      z-index: 100;
    }
  </style>
</head>
<body class="h-screen flex flex-col items-center p-1 md:p-2 overflow-hidden">

  <!-- 標題區 (全域共用) -->
  <div class="flex flex-col items-center w-full max-w-6xl mb-1 mt-1">
    <div class="flex items-center justify-center">
      <img src="https://i.imgur.com/PH99mC3.png" alt="logo" class="w-8 h-8 md:w-10 md:h-10 mr-2 object-contain hidden sm:block" onerror="this.style.display='none'">
      <h1 class="text-xl md:text-3xl text-center flex items-baseline gap-2 md:gap-3 esports-title">
        TRIANGLE X <span class="text-sm md:text-lg tracking-widest font-sans">全等召喚</span>
      </h1>
    </div>
  </div>

  <!-- 1. 主選單畫面 -->
  <div id="menuScreen" class="glass-panel p-6 w-full max-w-md text-center space-y-6 mt-4 md:mt-8">
    <h2 class="text-xl md:text-2xl font-bold text-indigo-300 mb-4">選擇遊戲模式</h2>
    <div class="space-y-4">
      <button onclick="startSoloMode()" class="btn-primary w-full py-3 md:py-4 rounded-xl font-bold text-lg md:text-xl flex flex-col items-center justify-center space-y-1">
        <span>👤 單機挑戰</span>
        <span class="text-xs font-normal text-indigo-200">一個人專心練習，挑戰高分</span>
      </button>
      <div class="relative flex py-1 items-center">
        <div class="flex-grow border-t border-gray-600"></div>
        <span class="flex-shrink-0 mx-4 text-gray-400">或</span>
        <div class="flex-grow border-t border-gray-600"></div>
      </div>
      <button onclick="enterLobbyMode()" class="btn-primary w-full py-3 md:py-4 rounded-xl font-bold text-lg md:text-xl flex flex-col items-center justify-center space-y-1">
        <span>🌐 連線對戰</span>
        <span class="text-xs font-normal text-indigo-200">建立房間或輸入房號與好友對戰</span>
      </button>
    </div>
  </div>

  <!-- 2. 單機挑戰畫面 (共用) -->
  <div id="soloScreen" class="hidden w-full max-w-3xl flex-col items-center space-y-1 flex-1 min-h-0 pb-1">
    <div class="glass-panel p-2 md:p-4 w-full flex flex-col h-full justify-between">
      <div>
        <div class="flex justify-between items-center border-b border-indigo-500 pb-1 mb-1">
          <div class="text-left">
            <div class="text-[10px] md:text-xs text-indigo-300">目前得分</div>
            <div class="text-lg md:text-2xl font-bold text-indigo-400" id="soloScore">0</div>
          </div>
          <div class="text-center">
            <div class="text-[10px] md:text-xs text-indigo-300">剩餘時間</div>
            <div class="text-lg md:text-2xl font-bold text-red-400 drop-shadow-[0_0_8px_rgba(255,45,85,0.8)]" id="soloTimer">03:30</div>
          </div>
          <div class="text-right">
            <div class="text-[10px] md:text-xs text-indigo-300">連續錯誤</div>
            <div class="text-lg md:text-2xl font-bold text-red-500" id="soloWrong">0</div>
          </div>
        </div>
        <div class="text-center mb-1">
          <span class="text-base md:text-lg text-gray-300">條件：</span>
          <span id="soloQuestion" class="text-lg md:text-xl font-bold text-yellow-400 tracking-wider">加載中...</span>
        </div>
      </div>
      
      <!-- 擴大圖形高度上限 -->
      <div class="grid grid-cols-2 gap-2 md:gap-4 mb-2 max-w-[400px] md:max-w-lg mx-auto w-full flex-1 min-h-0 items-center">
        <canvas id="triangleS1" class="w-full h-full object-contain"></canvas>
        <canvas id="triangleS2" class="w-full h-full object-contain"></canvas>
      </div>

      <div class="mt-1 max-w-2xl mx-auto w-full">
        <div class="bg-gray-900 bg-opacity-70 rounded-xl p-1.5 md:p-2 border border-indigo-500/30">
          <div class="text-center text-indigo-200 mb-1 text-[10px] md:text-xs font-semibold">請選擇全等依據：</div>
          <div class="flex flex-wrap justify-center gap-1.5 md:gap-2">
            <button class="btn-primary px-3 py-1 md:px-5 md:py-2 rounded-lg shadow font-bold text-sm md:text-base" onclick="submitSoloAnswer('SSS')">SSS</button>
            <button class="btn-primary px-3 py-1 md:px-5 md:py-2 rounded-lg shadow font-bold text-sm md:text-base" onclick="submitSoloAnswer('SAS')">SAS</button>
            <button class="btn-primary px-3 py-1 md:px-5 md:py-2 rounded-lg shadow font-bold text-sm md:text-base" onclick="submitSoloAnswer('ASA')">ASA</button>
            <button class="btn-primary px-3 py-1 md:px-5 md:py-2 rounded-lg shadow font-bold text-sm md:text-base" onclick="submitSoloAnswer('AAS')">AAS</button>
            <button class="btn-primary px-3 py-1 md:px-5 md:py-2 rounded-lg shadow font-bold text-sm md:text-base" onclick="submitSoloAnswer('RHS')">RHS</button>
            <button class="btn-primary px-3 py-1 md:px-5 md:py-2 rounded-lg shadow font-bold text-sm md:text-base" onclick="submitSoloAnswer('NOT')">不一定</button>
          </div>
        </div>
      </div>
      <button onclick="returnToMenu()" class="mt-2 text-gray-400 hover:text-white text-[10px] md:text-xs transition-colors text-center">← 返回主畫面</button>
    </div>
  </div>

  <!-- 3. 連線大廳畫面 (Lobby) -->
  <div id="lobbyScreen" class="hidden glass-panel p-8 w-full max-w-md text-center space-y-6 mt-8">
    <div id="loadingText" class="text-indigo-300 animate-pulse">連線至 MQTT 伺服器中...</div>
    <div id="lobbyActions" class="hidden space-y-6">
      <p class="text-gray-300">建立房間邀請朋友，或輸入房號加入遊戲。</p>
      <button onclick="createRoom()" class="btn-primary w-full py-3 rounded-lg font-bold text-lg">建立新房間</button>
      <div class="relative flex py-2 items-center">
        <div class="flex-grow border-t border-gray-600"></div>
        <span class="flex-shrink-0 mx-4 text-gray-400">或</span>
        <div class="flex-grow border-t border-gray-600"></div>
      </div>
      <div class="flex space-x-2">
        <input type="text" id="roomInput" placeholder="輸入5碼房號" class="w-2/3 px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white uppercase focus:outline-none focus:border-indigo-500 text-center text-lg font-bold">
        <button onclick="joinRoom()" class="btn-primary w-1/3 py-3 rounded-lg font-bold">加入</button>
      </div>
      <div id="lobbyError" class="text-red-400 text-sm h-4"></div>
      <button onclick="returnToMenu()" class="mt-4 text-gray-400 hover:text-white text-sm transition-colors w-full">← 返回主畫面</button>
    </div>
  </div>

  <!-- 4. 連線等待室 -->
  <div id="waitingScreen" class="hidden glass-panel p-8 w-full max-w-md text-center space-y-6 mt-8">
    <h2 class="text-2xl font-bold text-indigo-300">房間已建立</h2>
    <p class="text-gray-300">請將此房號告訴您的對手：</p>
    <div class="text-5xl font-bold text-white tracking-widest py-4 bg-gray-900 rounded-lg border border-indigo-500/50" id="displayRoomId"></div>
    <p class="text-sm text-indigo-400 animate-pulse mt-4">等待對手加入中...</p>
    <button onclick="returnToMenu()" class="mt-6 text-gray-400 hover:text-white text-sm transition-colors w-full">← 取消並返回</button>
  </div>

  <!-- 5. 階段過渡畫面 -->
  <div id="phaseTransition" class="hidden fixed inset-0 phase-overlay flex-col items-center justify-center space-y-4">
    <h2 id="phaseTitle" class="text-4xl md:text-7xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-indigo-500 tracking-widest drop-shadow-[0_0_15px_rgba(236,72,153,0.8)] text-center px-4"></h2>
    <p id="phaseDesc" class="text-lg md:text-2xl text-gray-300 text-center px-4"></p>
    <div class="text-6xl font-bold text-white mt-8 animate-bounce" id="phaseCountdown">3</div>
  </div>

  <!-- 6. 連線遊戲主畫面 -->
  <div id="multiplayerScreen" class="hidden w-full max-w-6xl flex-col items-center space-y-1 flex-1 min-h-0 pb-1">
    <div class="glass-panel p-1.5 md:p-2 w-full text-center flex flex-col items-center relative">
      <div class="w-full flex justify-between items-center px-2 md:px-4">
        <div class="text-xs md:text-sm">我是：<span id="myRoleLabel" class="font-bold text-yellow-400 text-sm md:text-lg"></span></div>
        <div class="text-xs md:text-sm font-bold text-indigo-300" id="phaseIndicator">階段一 (獨立標記)</div>
        <div class="text-xs md:text-sm">倒數：<span id="multiTimer" class="font-bold text-red-400 text-sm md:text-lg">03:30</span></div>
      </div>
      
      <!-- 狀態提示列 -->
      <div id="multiSystemMsg" class="absolute top-7 text-xs md:text-sm font-bold text-pink-400 drop-shadow-md h-4 transition-all"></div>
      
      <div class="text-base md:text-xl mt-3 md:mt-1">
        條件：<span id="multiQuestion" class="font-bold text-yellow-400 tracking-wider">加載中...</span>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-2 w-full relative flex-1 min-h-0" id="multiGrid">
      <!-- 玩家 A 區 -->
      <div id="areaA" class="glass-panel p-2 flex flex-col h-full transition-all duration-500 justify-between">
        <div class="text-sm md:text-base font-bold border-b border-indigo-500 pb-1 flex justify-between mb-1">
          <span>玩家 A <span id="tagA" class="text-[10px] text-yellow-400 hidden">(你)</span><br/><span class="text-[10px] font-normal">得分：<span id="scoreA" class="text-indigo-400 text-sm">0</span></span></span>
          <span class="text-[10px] text-right">連續錯誤<br/><span id="wrongA" class="text-red-500 font-bold text-sm">0</span></span>
        </div>
        
        <div class="grid grid-cols-2 gap-2 mb-1 max-w-[340px] sm:max-w-[420px] lg:max-w-[500px] mx-auto w-full flex-1 min-h-0 items-center">
          <canvas id="triangleA1" class="w-full h-full object-contain"></canvas>
          <canvas id="triangleA2" class="w-full h-full object-contain"></canvas>
        </div>
        
        <div class="mt-1">
          <div class="bg-gray-900 rounded-lg p-1.5 border border-indigo-500/30">
            <div class="flex flex-wrap justify-center gap-1.5 md:gap-2">
              <button class="btn-primary px-2 py-1 md:px-3 md:py-1.5 rounded shadow font-bold text-[10px] md:text-sm" onclick="submitMultiAnswer('SSS')">SSS</button>
              <button class="btn-primary px-2 py-1 md:px-3 md:py-1.5 rounded shadow font-bold text-[10px] md:text-sm" onclick="submitMultiAnswer('SAS')">SAS</button>
              <button class="btn-primary px-2 py-1 md:px-3 md:py-1.5 rounded shadow font-bold text-[10px] md:text-sm" onclick="submitMultiAnswer('ASA')">ASA</button>
              <button class="btn-primary px-2 py-1 md:px-3 md:py-1.5 rounded shadow font-bold text-[10px] md:text-sm" onclick="submitMultiAnswer('AAS')">AAS</button>
              <button class="btn-primary px-2 py-1 md:px-3 md:py-1.5 rounded shadow font-bold text-[10px] md:text-sm" onclick="submitMultiAnswer('RHS')">RHS</button>
              <button class="btn-primary px-2 py-1 md:px-3 md:py-1.5 rounded shadow font-bold text-[10px] md:text-sm" onclick="submitMultiAnswer('NOT')">不一定</button>
            </div>
          </div>
          <div class="text-center text-indigo-300 mt-0.5 h-4 text-[10px] md:text-xs" id="statusA">準備中...</div>
        </div>
      </div>

      <!-- 玩家 B 區 -->
      <div id="areaB" class="glass-panel p-2 flex flex-col h-full transition-all duration-500 justify-between">
        <div class="text-sm md:text-base font-bold border-b border-indigo-500 pb-1 flex justify-between mb-1">
          <span>玩家 B <span id="tagB" class="text-[10px] text-yellow-400 hidden">(你)</span><br/><span class="text-[10px] font-normal">得分：<span id="scoreB" class="text-indigo-400 text-sm">0</span></span></span>
          <span class="text-[10px] text-right">連續錯誤<br/><span id="wrongB" class="text-red-500 font-bold text-sm">0</span></span>
        </div>
        
        <div class="grid grid-cols-2 gap-2 mb-1 max-w-[340px] sm:max-w-[420px] lg:max-w-[500px] mx-auto w-full flex-1 min-h-0 items-center">
          <canvas id="triangleB1" class="w-full h-full object-contain"></canvas>
          <canvas id="triangleB2" class="w-full h-full object-contain"></canvas>
        </div>
        
        <div class="mt-1">
          <div class="bg-gray-900 rounded-lg p-1.5 border border-indigo-500/30">
            <div class="flex flex-wrap justify-center gap-1.5 md:gap-2">
              <button class="btn-primary px-2 py-1 md:px-3 md:py-1.5 rounded shadow font-bold text-[10px] md:text-sm" onclick="submitMultiAnswer('SSS')">SSS</button>
              <button class="btn-primary px-2 py-1 md:px-3 md:py-1.5 rounded shadow font-bold text-[10px] md:text-sm" onclick="submitMultiAnswer('SAS')">SAS</button>
              <button class="btn-primary px-2 py-1 md:px-3 md:py-1.5 rounded shadow font-bold text-[10px] md:text-sm" onclick="submitMultiAnswer('ASA')">ASA</button>
              <button class="btn-primary px-2 py-1 md:px-3 md:py-1.5 rounded shadow font-bold text-[10px] md:text-sm" onclick="submitMultiAnswer('AAS')">AAS</button>
              <button class="btn-primary px-2 py-1 md:px-3 md:py-1.5 rounded shadow font-bold text-[10px] md:text-sm" onclick="submitMultiAnswer('RHS')">RHS</button>
              <button class="btn-primary px-2 py-1 md:px-3 md:py-1.5 rounded shadow font-bold text-[10px] md:text-sm" onclick="submitMultiAnswer('NOT')">不一定</button>
            </div>
          </div>
          <div class="text-center text-indigo-300 mt-0.5 h-4 text-[10px] md:text-xs" id="statusB">準備中...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 共用結果頁面 (Modal) -->
  <div id="resultModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50">
    <div class="glass-panel p-8 max-w-lg text-center mx-4 w-full">
      <h2 class="text-4xl font-bold text-indigo-400 mb-6" id="resultTitle">遊戲結束！</h2>
      <p id="resultText" class="text-xl text-white mb-8 whitespace-pre-line leading-relaxed"></p>
      <div class="space-y-3">
        <button id="restartBtn" onclick="restartCurrentMode()" class="btn-primary px-8 py-3 rounded shadow-lg text-lg font-bold w-full hidden">
          再玩一次
        </button>
        <button onclick="returnToMenu()" class="bg-gray-700 hover:bg-gray-600 text-white px-8 py-3 rounded shadow-lg text-lg font-bold w-full transition-colors">
          返回主畫面
        </button>
      </div>
    </div>
  </div>

  <!-- Game Logic -->
  <script>
    // --- Data Definitions ---
    const questions = [
      { known: '∠A=∠D, ∠B=∠E, ∠C=∠F', correct: 'NOT', shape: "general" },
      { known: 'AB=DE, BC=EF, ∠A=∠D', correct: 'NOT', shape: "general" },
      { known: 'AB=DE, BC=EF, AC=DF', correct: 'SSS', shape: "general" },
      { known: 'AC=DF, BC=EF, AB=DE', correct: 'SSS', shape: "RHS" },
      { known: '∠A=∠D, AB=DE, AC=DF', correct: 'SAS', shape: "general" },
      { known: '∠A=∠D 為直角, AB=DE, AC=DF', correct: 'SAS', shape: 'RHS' },
      { known: '∠A=∠D, ∠B=∠E, AB=DE', correct: 'ASA', shape: "general" },
      { known: '∠C=∠F, ∠A=∠D 為直角, AC=DF', correct: 'ASA', shape: 'RHS' },
      { known: '∠A=∠D, ∠B=∠E, BC=EF', correct: 'AAS', shape: "general" },
      { known: '∠A=∠D 為直角, AB=DE, BC=EF', correct: 'RHS', shape: "RHS" }
    ];

    const easyquestions = [
      { known: 'AB=DE, BC=EF, AC=DF', correct: 'SSS', shape: "general" }, 
      { known: 'AB=DE, ∠A=∠D, AC=DF', correct: 'SAS', shape: "general" },
      { known: '∠A=∠D, AB=DE, ∠B=∠E', correct: 'ASA', shape: "general" },
      { known: '∠A=∠D, ∠B=∠E, BC=EF', correct: 'AAS', shape: "general" },
      { known: '∠A=∠D 為直角, AB=DE, BC=EF', correct: 'RHS', shape: "RHS" }
    ];

    // --- Global State ---
    let currentMode = 'menu'; // menu, solo, lobby, multi
    let globalTimerInterval = null;
    let selectedEdges = {};
    let selectedAngles = {};
    let systemMsgTimeout = null;

    // --- UI Navigation ---
    window.showScreen = function(screenId) {
      const screens = ['menuScreen', 'soloScreen', 'lobbyScreen', 'waitingScreen', 'multiplayerScreen', 'resultModal', 'phaseTransition'];
      screens.forEach(id => {
        const el = document.getElementById(id);
        if(el) {
          if (screenId === id) {
            el.classList.remove('hidden');
            if (id === 'soloScreen' || id === 'multiplayerScreen' || id === 'phaseTransition') el.classList.add('flex');
          } else {
            el.classList.add('hidden');
            if (id === 'soloScreen' || id === 'multiplayerScreen' || id === 'phaseTransition') el.classList.remove('flex');
          }
        }
      });
    };

    window.returnToMenu = function() {
      cleanupGame();
      showScreen('menuScreen');
      currentMode = 'menu';
    };

    function cleanupGame() {
      if (globalTimerInterval) clearInterval(globalTimerInterval);
      
      // MQTT Cleanup
      if (mqttClient && currentRoomId) {
        if (myRole === 'A') {
          mqttClient.publish(`trianglex/room/${currentRoomId}`, '', { retain: true });
        }
        mqttClient.unsubscribe(`trianglex/room/${currentRoomId}`);
      }
      
      myRole = null;
      currentRoomId = null;
      localGameState = null;
      selectedEdges = {};
      selectedAngles = {};
    }

    function showSystemMsg(msg, colorClass = 'text-pink-400') {
      const el = document.getElementById('multiSystemMsg');
      el.innerText = msg;
      el.className = `absolute top-7 text-xs md:text-sm font-bold drop-shadow-md h-4 transition-all ${colorClass}`;
      if(systemMsgTimeout) clearTimeout(systemMsgTimeout);
      systemMsgTimeout = setTimeout(() => { el.innerText = ''; }, 3000);
    }

    // ------------------------------------------------------------
    // --- 1. Solo Mode Logic ---
    // ------------------------------------------------------------
    let soloState = { score: 0, wrong: 0, easy_idx: 0, currentQ: 0, secondsRem: 0 };

    window.startSoloMode = function() {
      currentMode = 'solo';
      soloState = { score: 0, wrong: 0, easy_idx: 0, currentQ: Math.floor(Math.random() * easyquestions.length), secondsRem: 3.5 * 60 };
      showScreen('soloScreen');
      document.getElementById('restartBtn').classList.remove('hidden');
      updateSoloQuestionUI();
      startSoloTimer();
    };

    function updateSoloQuestionUI() {
      document.getElementById('soloScore').innerText = soloState.score;
      document.getElementById('soloWrong').innerText = soloState.wrong;
      const qArray = soloState.easy_idx < 5 ? easyquestions : questions;
      document.getElementById('soloQuestion').innerText = qArray[soloState.currentQ].known;
      selectedEdges = { triangleS1: {}, triangleS2: {} };
      selectedAngles = { triangleS1: {}, triangleS2: {} };
      drawAllTriangles(qArray[soloState.currentQ], ['triangleS1', 'triangleS2']);
    }

    window.submitSoloAnswer = function(ans) {
      const qArray = soloState.easy_idx < 5 ? easyquestions : questions;
      const correct = qArray[soloState.currentQ].correct;
      
      if (ans === correct) {
        soloState.score++; soloState.wrong = 0;
        flashColor('soloScore', 'text-green-400');
      } else {
        soloState.wrong++; flashColor('soloWrong', 'text-red-400');
        if (soloState.wrong >= 3) { endSoloGame('連續答錯三次'); return; }
      }
      soloState.easy_idx++;
      const nextArray = soloState.easy_idx < 5 ? easyquestions : questions;
      soloState.currentQ = Math.floor(Math.random() * nextArray.length);
      updateSoloQuestionUI();
    };

    function startSoloTimer() {
      if (globalTimerInterval) clearInterval(globalTimerInterval);
      const timerElement = document.getElementById('soloTimer');
      timerElement.classList.remove('animate-pulse');
      globalTimerInterval = setInterval(() => {
        soloState.secondsRem--;
        const s = soloState.secondsRem;
        timerElement.textContent = `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
        if (s <= 30) timerElement.classList.add('animate-pulse');
        if (s <= 0) { clearInterval(globalTimerInterval); endSoloGame('時間到！'); }
      }, 1000);
    }

    function endSoloGame(reason) {
      clearInterval(globalTimerInterval);
      document.getElementById('resultModal').classList.remove('hidden');
      document.getElementById('resultTitle').innerText = "單機挑戰結束";
      document.getElementById('resultText').innerText = `原因：${reason}\n\n獲得總分：${soloState.score}`;
    }

    function flashColor(id, colorClass) {
      const el = document.getElementById(id);
      if(!el) return;
      el.classList.add(colorClass);
      setTimeout(() => el.classList.remove(colorClass), 1000);
    }

    window.restartCurrentMode = function() {
      if(currentMode === 'solo') startSoloMode();
    };


    // ------------------------------------------------------------
    // --- 2. Multiplayer Logic (MQTT) ---
    // ------------------------------------------------------------
    let mqttClient = null;
    let isConnected = false;
    let myRole = null;
    let currentRoomId = null;
    let localGameState = null;
    let clientId = 'tx_' + Math.random().toString(16).substr(2, 8);

    function initMqtt() {
      const brokerUrl = 'wss://broker.emqx.io:8084/mqtt';
      mqttClient = mqtt.connect(brokerUrl, { clientId: clientId, clean: true, connectTimeout: 5000 });
      mqttClient.on('connect', () => {
        isConnected = true;
        document.getElementById('loadingText').classList.add('hidden');
        document.getElementById('lobbyActions').classList.remove('hidden');
      });
      mqttClient.on('error', (err) => {
        console.error('MQTT Connection Error: ', err);
        document.getElementById('loadingText').innerText = "MQTT 伺服器連線失敗，請重整或選擇單機版";
      });
      mqttClient.on('message', (topic, message) => {
        if (!currentRoomId || topic !== `trianglex/room/${currentRoomId}`) return;
        if (message.length === 0) return;
        try {
          const data = JSON.parse(message.toString());
          if (myRole === 'B' && currentMode === 'lobby') {
            if (data.status === 'waiting') {
              data.players.B = clientId;
              data.status = 'phase1_intro'; 
              data.gameData.phaseEndTime = Date.now() + 3000; 
              mqttClient.publish(`trianglex/room/${currentRoomId}`, JSON.stringify(data), { retain: true });
              return; 
            } else if (data.status !== 'waiting' && data.players.B !== clientId) {
              showLobbyError('該房間遊戲已經開始或已結束');
              mqttClient.unsubscribe(`trianglex/room/${currentRoomId}`);
              currentRoomId = null;
              return;
            }
          }
          handleRoomStateChange(data);
        } catch (e) { console.error(e); }
      });
    }

    window.addEventListener('load', initMqtt);

    window.enterLobbyMode = function() { currentMode = 'lobby'; showScreen('lobbyScreen'); };

    window.createRoom = function() {
      if (!isConnected) return showLobbyError('系統連線中，請稍後');
      try {
        const roomId = Math.random().toString(36).substring(2, 7).toUpperCase();
        currentRoomId = roomId; myRole = 'A';

        const initialState = {
          players: { A: clientId, B: null },
          status: 'waiting',
          gameData: {
            scoreA: 0, scoreB: 0, wrongA: 0, wrongB: 0,
            p1_idxA: 0, p1_qA: Math.floor(Math.random() * easyquestions.length),
            p1_idxB: 0, p1_qB: Math.floor(Math.random() * easyquestions.length),
            p2_idx: 0, p2_q: Math.floor(Math.random() * easyquestions.length),
            ansA: null, ansB: null, 
            phaseEndTime: 0, nextQTime: 0
          },
          winner: null, reason: null
        };
        mqttClient.subscribe(`trianglex/room/${currentRoomId}`);
        mqttClient.publish(`trianglex/room/${currentRoomId}`, JSON.stringify(initialState), { retain: true });
        showScreen('waitingScreen');
        document.getElementById('displayRoomId').innerText = roomId;
      } catch (err) { showLobbyError('建立房間失敗：' + err.message); }
    };

    window.joinRoom = function() {
      if (!isConnected) return showLobbyError('系統連線中，請稍後');
      const roomId = document.getElementById('roomInput').value.trim().toUpperCase();
      if (!roomId || roomId.length !== 5) return showLobbyError('請輸入完整的5碼房號');
      currentRoomId = roomId; myRole = 'B';
      mqttClient.subscribe(`trianglex/room/${currentRoomId}`);
      setTimeout(() => {
        if (currentMode === 'lobby' && currentRoomId === roomId) {
          showLobbyError('找不到該房間，或連線逾時');
          mqttClient.unsubscribe(`trianglex/room/${currentRoomId}`);
          currentRoomId = null;
        }
      }, 3000);
    };

    function showLobbyError(msg) {
      const el = document.getElementById('lobbyError');
      el.innerText = msg; setTimeout(() => el.innerText = '', 3000);
    }

    // --- State & UI Updates ---
    function handleRoomStateChange(data) {
      localGameState = data;
      const st = data.status;

      if (!globalTimerInterval && ['phase1_intro', 'phase1', 'phase2_intro', 'phase2'].includes(st)) {
        startMultiTimer();
      }

      if (st === 'phase1_intro') {
        showPhaseIntro("進入第一階段", "個人答題，必須在圖形上標記邊角才能答對", data.gameData.phaseEndTime);
      } else if (st === 'phase1') {
        if(currentMode !== 'multi') startMultiUI();
        updatePhase1UI(data);
      } else if (st === 'phase2_intro') {
        showPhaseIntro("進入第二階段", "雙方共用題目，搶答模式 (不需標記)", data.gameData.phaseEndTime);
      } else if (st === 'phase2') {
        if(currentMode !== 'multi') startMultiUI();
        updatePhase2UI(data);
      } else if (st === 'finished') {
        showMultiResultModal(data);
      }
    }

    function showPhaseIntro(title, desc, endTime) {
      currentMode = 'transition';
      showScreen('phaseTransition');
      document.getElementById('phaseTitle').innerText = title;
      document.getElementById('phaseDesc').innerText = desc;
      
      const updateCountdown = () => {
        const rem = Math.max(0, endTime - Date.now());
        document.getElementById('phaseCountdown').innerText = Math.ceil(rem / 1000);
      };
      updateCountdown();
      const ival = setInterval(updateCountdown, 200);
      setTimeout(() => clearInterval(ival), endTime - Date.now() + 500);
    }

    function startMultiUI() {
      currentMode = 'multi';
      showScreen('multiplayerScreen');
      document.getElementById('restartBtn').classList.add('hidden'); 
      document.getElementById('myRoleLabel').innerText = `玩家 ${myRole}`;
      document.getElementById(`tagA`).classList.add('hidden');
      document.getElementById(`tagB`).classList.add('hidden');
      document.getElementById(`tag${myRole}`).classList.remove('hidden');
      
      if (!globalTimerInterval) startMultiTimer();
    }

    function updatePhase1UI(data) {
      document.getElementById('phaseIndicator').innerText = "階段一：獨立標記";
      const gd = data.gameData;
      syncScores(gd);
      
      const opponent = myRole === 'A' ? 'B' : 'A';
      document.getElementById(`area${opponent}`).classList.add('hidden');
      document.getElementById(`area${myRole}`).classList.add('md:col-span-2');
      
      const qArray = gd[`p1_idx${myRole}`] < 5 ? easyquestions : questions;
      const myQ = qArray[gd[`p1_q${myRole}`]];
      
      if (document.getElementById('multiQuestion').innerText !== myQ.known) {
        document.getElementById('multiQuestion').innerText = myQ.known;
        selectedEdges = { triangleA1:{}, triangleA2:{}, triangleB1:{}, triangleB2:{} };
        selectedAngles = { triangleA1:{}, triangleA2:{}, triangleB1:{}, triangleB2:{} };
        drawAllTriangles(myQ, [`triangle${myRole}1`, `triangle${myRole}2`]);
      }
    }

    function updatePhase2UI(data) {
      document.getElementById('phaseIndicator').innerText = "階段二：搶答模式";
      const gd = data.gameData;
      syncScores(gd);
      
      const opponent = myRole === 'A' ? 'B' : 'A';
      document.getElementById(`area${opponent}`).classList.remove('hidden');
      document.getElementById(`area${myRole}`).classList.remove('md:col-span-2');
      
      const qArray = gd.p2_idx < 5 ? easyquestions : questions;
      const multiQ = qArray[gd.p2_q];
      
      if (document.getElementById('multiQuestion').innerText !== multiQ.known) {
        document.getElementById('multiQuestion').innerText = multiQ.known;
        selectedEdges = { triangleA1:{}, triangleA2:{}, triangleB1:{}, triangleB2:{} };
        selectedAngles = { triangleA1:{}, triangleA2:{}, triangleB1:{}, triangleB2:{} };
        drawAllTriangles(multiQ, ['triangleA1', 'triangleA2', 'triangleB1', 'triangleB2']);
      }

      document.getElementById('statusA').innerText = gd.ansA ? `已送出答案` : '思考中...';
      document.getElementById('statusB').innerText = gd.ansB ? `已送出答案` : '思考中...';

      if (gd.nextQTime > 0 && gd.phaseWinner) {
        showSystemMsg(`玩家 ${gd.phaseWinner} 率先答對！5 秒後進入下一題...`, 'text-green-400');
      }
    }

    function syncScores(gd) {
      document.getElementById('scoreA').innerText = gd.scoreA;
      document.getElementById('scoreB').innerText = gd.scoreB;
      document.getElementById('wrongA').innerText = gd.wrongA;
      document.getElementById('wrongB').innerText = gd.wrongB;
    }

    // --- Answer Logic ---
    function normalizeEdgeStr(str) { return str.split('').sort().join(''); }

    function checkSelectionMatch(knownStr, role) {
      const expE = new Set(), expA = new Set();
      knownStr.split(',').forEach(p => {
        let clean = p.replace('為直角', '').trim();
        let sides = clean.split('=');
        if (sides.length === 2) {
          let left = sides[0].trim(), right = sides[1].trim();
          if (left.startsWith('∠')) { expA.add(left); expA.add(right); } 
          else { expE.add(normalizeEdgeStr(left)); expE.add(normalizeEdgeStr(right)); }
        }
      });

      let actE = new Set(), actA = new Set();
      [`triangle${role}1`, `triangle${role}2`].forEach(id => {
        for(let k in selectedEdges[id]) if(selectedEdges[id][k]) actE.add(normalizeEdgeStr(k));
        for(let k in selectedAngles[id]) if(selectedAngles[id][k]) actA.add(k);
      });

      if (expE.size !== actE.size || expA.size !== actA.size) return false;
      for(let e of expE) if (!actE.has(e)) return false;
      for(let a of expA) if (!actA.has(a)) return false;
      return true;
    }

    window.submitMultiAnswer = function(ans) {
      if (!isConnected || !localGameState) return;
      const st = localGameState.status;
      const gd = localGameState.gameData;

      if (st === 'phase1') {
        const qArray = gd[`p1_idx${myRole}`] < 5 ? easyquestions : questions;
        const qObj = qArray[gd[`p1_q${myRole}`]];
        
        if (!checkSelectionMatch(qObj.known, myRole)) {
          showSystemMsg('標記錯誤！請根據條件點擊正確的邊與角', 'text-red-400');
          gd[`wrong${myRole}`]++;
        } else if (ans === qObj.correct) {
          showSystemMsg('正確！', 'text-green-400');
          gd[`score${myRole}`]++; gd[`wrong${myRole}`] = 0;
          gd[`p1_idx${myRole}`]++;
          const nextArray = gd[`p1_idx${myRole}`] < 5 ? easyquestions : questions;
          gd[`p1_q${myRole}`] = Math.floor(Math.random() * nextArray.length);
        } else {
          showSystemMsg('答案錯誤！', 'text-red-400');
          gd[`wrong${myRole}`]++;
        }
      } 
      else if (st === 'phase2') {
        // 修改：允許在 5 秒倒數期間，對手依然可以作答，只要他還沒答過
        if (gd[`ans${myRole}`] !== null) return; 
        
        const qArray = gd.p2_idx < 5 ? easyquestions : questions;
        const qObj = qArray[gd.p2_q];
        
        gd[`ans${myRole}`] = ans;
        if (ans === qObj.correct) {
          gd[`score${myRole}`]++; gd[`wrong${myRole}`] = 0;
          if (gd.nextQTime === 0) {
            gd.nextQTime = Date.now() + 5000;
            gd.phaseWinner = myRole; // 記錄誰先觸發了倒數
          }
        } else {
          gd[`wrong${myRole}`]++;
        }
      }

      if (gd[`wrong${myRole}`] >= 3) {
        localGameState.status = 'finished';
        localGameState.winner = myRole === 'A' ? 'B' : 'A';
        localGameState.reason = `玩家 ${myRole} 連續答錯三次`;
      }
      mqttClient.publish(`trianglex/room/${currentRoomId}`, JSON.stringify(localGameState), { retain: true });
    };

    // --- Host Ticker Logic ---
    function startMultiTimer() {
      if (globalTimerInterval) clearInterval(globalTimerInterval);
      const timerElement = document.getElementById('multiTimer');
      
      globalTimerInterval = setInterval(() => {
        if (!localGameState) return;
        const st = localGameState.status;
        const gd = localGameState.gameData;
        const now = Date.now();
        
        if (st === 'phase1' || st === 'phase2') {
          const rem = Math.max(0, gd.phaseEndTime - now);
          const seconds = Math.floor(rem / 1000);
          timerElement.textContent = `${String(Math.floor(seconds / 60)).padStart(2, '0')}:${String(seconds % 60).padStart(2, '0')}`;
          if (seconds <= 10) timerElement.classList.add('animate-pulse');
          else timerElement.classList.remove('animate-pulse');
        }

        if (myRole === 'A') {
          if (st === 'phase1_intro' && now > gd.phaseEndTime) {
            localGameState.status = 'phase1';
            gd.phaseEndTime = now + 90000; // 90 秒
            publishState();
          } else if (st === 'phase1' && now > gd.phaseEndTime) {
            localGameState.status = 'phase2_intro';
            gd.phaseEndTime = now + 3000; // 3 秒
            publishState();
          } else if (st === 'phase2_intro' && now > gd.phaseEndTime) {
            localGameState.status = 'phase2';
            gd.phaseEndTime = now + 120000; // 120 秒
            publishState();
          } else if (st === 'phase2' && now > gd.phaseEndTime) {
            const scA = gd.scoreA, scB = gd.scoreB;
            const winner = scA > scB ? 'A' : (scB > scA ? 'B' : null);
            localGameState.status = 'finished';
            localGameState.winner = winner;
            localGameState.reason = winner ? '時間到！' : '時間到！雙方平手';
            publishState();
          }
          
          // Phase 2: Next question trigger (某方答對後經過 5 秒)
          if (st === 'phase2' && gd.nextQTime > 0 && now > gd.nextQTime) {
            gd.p2_idx++;
            const qArray = gd.p2_idx < 5 ? easyquestions : questions;
            gd.p2_q = Math.floor(Math.random() * qArray.length);
            // 重置雙方答案與計時
            gd.ansA = null; gd.ansB = null;
            gd.nextQTime = 0; gd.phaseWinner = null;
            publishState();
          }
        }
      }, 500);
    }
    
    function publishState() {
      mqttClient.publish(`trianglex/room/${currentRoomId}`, JSON.stringify(localGameState), { retain: true });
    }

    function showMultiResultModal(data) {
      clearInterval(globalTimerInterval);
      document.getElementById('resultModal').classList.remove('hidden');
      const win = data.winner;
      let title = win === myRole ? "🎉 你贏了！" : (win ? "💀 你輸了..." : "🤝 平手！");
      
      document.getElementById('resultTitle').innerText = title;
      document.getElementById('resultText').innerText = `原因：${data.reason}\n\n你的分數：${data.gameData[`score${myRole}`]}\n對手分數：${data.gameData[`score${myRole === 'A'?'B':'A'}`]}`;
    }


    // ------------------------------------------------------------
    // --- 3. Shared Canvas Logic ---
    // ------------------------------------------------------------
    function drawAllTriangles(questionData, canvasIds) {
      canvasIds.forEach((id, i) => {
        const canvas = document.getElementById(id);
        if(!canvas) return;
        canvas.width = canvas.clientWidth || 300; 
        canvas.height = canvas.clientHeight || 300;
        
        const isRHS = questionData.shape === 'RHS';
        const p = 30, w = canvas.width - p, h = canvas.height - p;
        const labels = i % 2 === 0 ? ['A','B','C'] : ['D','E','F'];
        const points = isRHS ? 
          [ {x:p,y:h,label:labels[0]}, {x:w,y:h,label:labels[1]}, {x:p,y:p,label:labels[2]} ] :
          [ {x:p,y:h,label:labels[0]}, {x:w,y:h,label:labels[1]}, {x:canvas.width/2,y:p,label:labels[2]} ];
        
        canvas.triangleData = {
          points,
          angles: [
            {point: points[0], label: `∠${labels[0]}`, adj1: points[2], adj2: points[1]},
            {point: points[1], label: `∠${labels[1]}`, adj1: points[0], adj2: points[2]},
            {point: points[2], label: `∠${labels[2]}`, adj1: points[1], adj2: points[0]}
          ],
          edges: [
            {points: [points[0], points[1]], label: labels[0]+labels[1]},
            {points: [points[1], points[2]], label: labels[1]+labels[2]},
            {points: [points[2], points[0]], label: labels[0]+labels[2]}
          ]
        };
        drawTriangle(canvas, id);
      });
    }

    function drawTriangle(canvas, id) {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const d = canvas.triangleData;
      if(!d) return;
      
      d.edges.forEach(e => {
        ctx.beginPath(); ctx.moveTo(e.points[0].x, e.points[0].y); ctx.lineTo(e.points[1].x, e.points[1].y);
        ctx.strokeStyle = selectedEdges[id]?.[e.label] ? '#10B981' : 'rgba(255,255,255,0.7)';
        ctx.lineWidth = selectedEdges[id]?.[e.label] ? 4 : 2;
        ctx.stroke();
      });
      d.angles.forEach(a => {
        if (selectedAngles[id]?.[a.label]) {
          const a1 = Math.atan2(a.adj1.y - a.point.y, a.adj1.x - a.point.x);
          const a2 = Math.atan2(a.adj2.y - a.point.y, a.adj2.x - a.point.x);
          let diff = a2 - a1;
          while (diff < -Math.PI) diff += 2 * Math.PI;
          while (diff > Math.PI) diff -= 2 * Math.PI;
          ctx.beginPath(); ctx.moveTo(a.point.x, a.point.y); ctx.arc(a.point.x, a.point.y, 25, a1, a1 + diff, diff < 0); ctx.closePath();
          ctx.fillStyle = 'rgba(236, 72, 153, 0.4)'; ctx.fill();
          ctx.strokeStyle = '#EC4899'; ctx.lineWidth = 2; ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(a.point.x, a.point.y, 6, 0, Math.PI*2);
        ctx.fillStyle = selectedAngles[id]?.[a.label] ? '#EC4899' : '#fff'; ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.font = 'bold 16px sans-serif';
        ctx.fillText(a.point.label, a.point.x - 5, a.point.label==='C'||a.point.label==='F' ? a.point.y-15 : a.point.y+25);
      });
    }

    function getDistanceToSegment(px, py, x1, y1, x2, y2) {
      const l2 = (x1 - x2) ** 2 + (y1 - y2) ** 2;
      if (l2 === 0) return Math.hypot(px - x1, py - y1);
      let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
      t = Math.max(0, Math.min(1, t));
      return Math.hypot(px - (x1 + t * (x2 - x1)), py - (y1 + t * (y2 - y1)));
    }

    const allCanvasIds = ['triangleS1', 'triangleS2', 'triangleA1', 'triangleA2', 'triangleB1', 'triangleB2'];
    allCanvasIds.forEach(id => {
      const canvas = document.getElementById(id);
      if(!canvas) return;
      canvas.addEventListener('click', e => {
        if(currentMode === 'multi' && !id.includes(myRole)) return; 
        if(!canvas.triangleData) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width), y = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        let clicked = false;
        for(let a of canvas.triangleData.angles) {
          if(Math.hypot(x-a.point.x, y-a.point.y) < 25) {
            selectedAngles[id][a.label] = !selectedAngles[id][a.label]; clicked = true; break;
          }
        }
        if(!clicked) {
          let closestEdge = null, minDist = 20;
          for(let ed of canvas.triangleData.edges) {
            const dist = getDistanceToSegment(x, y, ed.points[0].x, ed.points[0].y, ed.points[1].x, ed.points[1].y);
            if (dist < minDist) { minDist = dist; closestEdge = ed; }
          }
          if (closestEdge) selectedEdges[id][closestEdge.label] = !selectedEdges[id][closestEdge.label];
        }
        drawTriangle(canvas, id);
      });
    });

    window.addEventListener('resize', () => { 
      if(currentMode === 'solo') {
        const qArray = soloState.easy_idx < 5 ? easyquestions : questions;
        drawAllTriangles(qArray[soloState.currentQ], ['triangleS1', 'triangleS2']);
      } else if(currentMode === 'multi' && localGameState) {
        if(localGameState.status === 'phase1') updatePhase1UI(localGameState);
        else if(localGameState.status === 'phase2') updatePhase2UI(localGameState);
      }
    });

  </script>
