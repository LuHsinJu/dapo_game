<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學密室逃脫 - 簡化版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background-color: #0a0a23;
            color: #4da6ff;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            border-bottom: 2px solid #00ccff;
            position: relative;
        }
        
        header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ccff;
            text-shadow: 0 0 10px #00ccff, 0 0 20px #00ccff;
            animation: flicker 2s infinite;
        }
        
        @keyframes flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% {
                opacity: 1;
            }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% {
                opacity: 0.8;
            }
        }
        
        .game-area {
            background-color: #0f0f2d;
            border: 2px solid #00ccff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 15px #00ccff;
        }
        
        .room {
            display: none;
            animation: fadeIn 1s;
        }
        
        .room.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .room h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #00ccff;
            text-shadow: 0 0 5px #00ccff;
        }
        
        .room p {
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 1.1rem;
        }
        
        .challenge {
            padding: 20px;
            background-color: #131340;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 10px #000;
        }
        
        .challenge h3 {
            color: #66ffff;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .input-area {
            margin-top: 20px;
        }
        
        input[type="text"], input[type="number"] {
            background-color: #0a0a23;
            color: #00ccff;
            border: 1px solid #00ccff;
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        
        button {
            background-color: #00ccff;
            color: #0a0a23;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button:hover {
            background-color: #66ffff;
            box-shadow: 0 0 15px #00ccff;
        }
        
        .message {
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .success {
            background-color: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            border: 1px solid #00ff00;
        }
        
        .error {
            background-color: rgba(255, 0, 0, 0.2);
            color: #ff0066;
            border: 1px solid #ff0066;
        }
        
        .hint-btn {
            background-color: transparent;
            color: #ffcc00;
            border: 1px solid #ffcc00;
            margin-top: 10px;
        }
        
        .hint-btn:hover {
            background-color: #ffcc00;
            color: #0a0a23;
        }
        
        .hint {
            display: none;
            padding: 15px;
            background-color: rgba(255, 204, 0, 0.1);
            border: 1px solid #ffcc00;
            color: #ffcc00;
            border-radius: 5px;
            margin-top: 15px;
        }
        
        #timer {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            color: #ff3366;
            font-weight: bold;
        }
        
        .graph-container {
            width: 300px;
            height: 300px;
            margin: 0 auto;
            position: relative;
            background-color: #131340;
            border: 1px solid #00ccff;
        }
        
        .coordinate-system {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .x-axis, .y-axis {
            position: absolute;
            background-color: #00ccff;
        }
        
        .x-axis {
            width: 100%;
            height: 2px;
            top: 50%;
        }
        
        .y-axis {
            width: 2px;
            height: 100%;
            left: 50%;
        }
        
        .line {
            position: absolute;
            height: 2px;
            background-color: #ff3366;
            transform-origin: 0 0;
        }
        
        .terminal {
            background-color: #000;
            color: #00cc00;
            font-family: 'Courier New', monospace;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #00cc00;
        }
        
        .terminal-text {
            margin: 0;
            line-height: 1.4;
        }
        
        .terminal-input {
            display: flex;
            margin-top: 10px;
        }
        
        .terminal-input span {
            color: #00cc00;
            margin-right: 5px;
        }
        
        .terminal-input input {
            background-color: transparent;
            border: none;
            color: #00cc00;
            font-family: 'Courier New', monospace;
            flex-grow: 1;
            outline: none;
        }
        
        .progress-container {
            width: 100%;
            background-color: #131340;
            border-radius: 5px;
            margin-bottom: 20px;
            height: 20px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #00ccff;
            text-align: center;
            line-height: 20px;
            color: white;
            transition: width 0.5s;
        }
        
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(10, 10, 35, 0.8) 1px, transparent 1px), 
                        linear-gradient(90deg, rgba(10, 10, 35, 0.8) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: -1;
        }
        
        .fraction-table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
        }
        
        .fraction-table td {
            border: 1px solid #00ccff;
            padding: 10px;
            text-align: center;
            color: #4da6ff;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .room h2 {
                font-size: 1.5rem;
            }
            
            .graph-container {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="container">
        <header>
            <h1>數學密室逃脫</h1>
            <div id="timer">20:00</div>
        </header>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress">0%</div>
        </div>
        
        <div class="game-area">
            <div class="room active" id="intro">
                <h2>歡迎來到數學密室逃脫</h2>
                <p>你被困在一個神秘的電腦密室中，要逃出去，你必須解決三個數學謎題。</p>
                <p>系統提示：根據你的國中數學知識解鎖每個關卡，成功逃出這個密室！</p>
                <div class="terminal">
                    <p class="terminal-text">系統啟動中...</p>
                    <p class="terminal-text">檢測到用戶進入...</p>
                    <p class="terminal-text">歡迎來到國中數學密室逃脫挑戰。</p>
                    <p class="terminal-text">你有20分鐘的時間解開所有謎題。</p>
                    <p class="terminal-text">共有三個關卡等著你挑戰。</p>
                    <p class="terminal-text">祝你好運！</p>
                    <div class="terminal-input">
                        <span>></span>
                        <input type="text" id="start-input" placeholder="輸入 'start' 開始遊戲">
                    </div>
                </div>
            </div>
            
            <div class="room" id="current-room">
                <h2 id="room-title">關卡標題</h2>
                <p id="room-description">關卡描述</p>
                
                <div class="challenge">
                    <h3 id="challenge-title">挑戰標題</h3>
                    <p id="challenge-description">挑戰描述</p>
                    
                    <div id="challenge-content"></div>
                    
                    <div class="input-area">
                        <label for="current-answer" id="answer-label">答案：</label>
                        <input type="text" id="current-answer" placeholder="請輸入答案">
                        <button onclick="checkAnswer()">提交答案</button>
                        <button class="hint-btn" onclick="showHint()">提示</button>
                        <div class="hint" id="current-hint"></div>
                        <div id="message" class="message"></div>
                    </div>
                </div>
            </div>
            
            <div class="room" id="final">
                <h2>恭喜你成功逃出！</h2>
                <p>你成功解決了所有的數學謎題，證明了你的國中數學能力和邏輯思維！</p>
                <p>總用時：<span id="time-used">00:00</span></p>
                <button onclick="restartGame()">再玩一次</button>
            </div>
        </div>
    </div>
    
    <script>
        // 遊戲變數
        let startTime;
        let timerInterval;
        let secondsLeft = 1200; // 20分鐘
        let currentRoomIndex = 0;
        
        // 所有關卡資料集中在一個陣列中
        const rooms = [
            {
                title: "第一關：二元一次方程式圖形",
                description: "要解開這個房間的門鎖，你需要找出圖中顯示的兩條直線的交點座標。",
                challengeTitle: "挑戰：找出下列兩條直線的交點",
                challengeDescription: `直線方程式 1：y = 2x - 3<br>直線方程式 2：y = -x + 6`,
                contentHTML: ``,
                // <div class="graph-container">
                  // <div class="coordinate-system">
                  //           <div class="x-axis"></div>
                  //           <div class="y-axis"></div>
                  //           <div class="line" id="line1"></div>
                  //           <div class="line" id="line2"></div>
                  //       </div>
                  //   </div>
                hint: "將兩個方程式聯立求解：2x - 3 = -x + 6，解出 x 後再代入其中一個方程式求 y。",
                answerLabel: "交點座標 (x, y)：",
                answerPlaceholder: "格式：x,y",
                correctAnswer: "3,3",
                initFunction: function() {
                    // 繪製直線
                    const line1 = document.getElementById('line1');
                    const line2 = document.getElementById('line2');
                    
                    // 繪製 y = 2x - 3
                    // line1.style.width = '300px';
                    // line1.style.transform = 'rotate(-63.4deg) translateY(150px)';
                    // line1.style.top = '150px';
                    // line1.style.left = '150px';
                    
                    // 繪製 y = -x + 6
                    // line2.style.width = '300px';
                    // line2.style.transform = 'rotate(45deg) translateY(150px)';
                    // line2.style.top = '150px';
                    // line2.style.left = '150px';
                }
            },
            {
                title: "第二關：比與比例式",
                description: "這個房間的門被一個複雜的比例鎖鎖著，你需要解決下面的比例問題才能繼續前進。",
                challengeTitle: "挑戰：解決比例問題",
                challengeDescription: `在一場電競比賽中，紅隊與藍隊的得分比為 5:7。<br>如果兩隊總得分為 180 分，那麼藍隊得了多少分？`,
                contentHTML: "",
                hint: "設紅隊得分為 5x，藍隊得分為 7x，則 5x + 7x = 180。求解 x 後，藍隊得分為 7x。",
                answerLabel: "藍隊得分：",
                answerPlaceholder: "請輸入數字",
                correctAnswer: "105",
                initFunction: function() {}
            },
            {
                title: "第三關：分數運算",
                description: "這扇門上有一堆混亂的分數，你需要正確計算它們的加減乘除。",
                challengeTitle: "挑戰：解決分數運算問題",
                challengeDescription: "計算下列表達式的值：",
                contentHTML: `
                    <table class="fraction-table">
                        <tr>
                            <td>2/3</td>
                            <td>×</td>
                            <td>3/4</td>
                            <td>+</td>
                            <td>1/6</td>
                        </tr>
                    </table>
                    <p>請將答案化為最簡分數，並以分子/分母的形式輸入。</p>
                `,
                hint: "先計算乘法部分：2/3 × 3/4 = 6/12 = 1/2，然後加上 1/6：1/2 + 1/6 = 3/6 + 1/6 = 4/6 = 2/3。",
                answerLabel: "運算結果：",
                answerPlaceholder: "格式：分子/分母",
                correctAnswer: "2/3",
                initFunction: function() {}
            }
        ];
        
        // 初始化遊戲
        document.addEventListener('DOMContentLoaded', function() {
            // 開始輸入監聽
            document.getElementById('start-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    if (this.value.toLowerCase() === 'start') {
                        startGame();
                    }
                }
            });
        });
        
        // 開始遊戲
        function startGame() {
            startTime = new Date();
            currentRoomIndex = 0;
            loadRoom(currentRoomIndex);
            updateProgress(0);
            
            // 啟動計時器
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        // 載入房間
        function loadRoom(index) {
            const room = rooms[index];
            document.getElementById('room-title').textContent = room.title;
            document.getElementById('room-description').textContent = room.description;
            document.getElementById('challenge-title').textContent = room.challengeTitle;
            document.getElementById('challenge-description').innerHTML = room.challengeDescription;
            document.getElementById('challenge-content').innerHTML = room.contentHTML;
            document.getElementById('current-hint').textContent = room.hint;
            document.getElementById('answer-label').textContent = room.answerLabel;
            document.getElementById('current-answer').placeholder = room.answerPlaceholder;
            document.getElementById('current-answer').value = '';
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
            
            // 隱藏提示
            document.getElementById('current-hint').style.display = 'none';
            
            // 執行房間初始化函數
            room.initFunction();
            
            // 顯示當前房間
            document.getElementById('intro').classList.remove('active');
            document.getElementById('final').classList.remove('active');
            document.getElementById('current-room').classList.add('active');
        }
        
        // 更新計時器
        function updateTimer() {
            secondsLeft--;
            
            if (secondsLeft <= 0) {
                clearInterval(timerInterval);
                alert('時間到！遊戲結束');
                restartGame();
                return;
            }
            
            const minutes = Math.floor(secondsLeft / 60);
            const seconds = secondsLeft % 60;
            
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // 顯示房間
        function showRoom(roomId) {
            document.querySelectorAll('.room').forEach(room => {
                room.classList.remove('active');
            });
            
            document.getElementById(roomId).classList.add('active');
        }
        
        // 更新進度
        function updateProgress(roomIndex) {
            const percent = Math.round((roomIndex / rooms.length) * 100);
            document.getElementById('progress').style.width = percent + '%';
            document.getElementById('progress').textContent = percent + '%';
        }
        
        // 顯示提示
        function showHint() {
            const hint = document.getElementById('current-hint');
            if (hint.style.display === 'block') {
                hint.style.display = 'none';
            } else {
                hint.style.display = 'block';
            }
        }
        
        // 檢查答案
        function checkAnswer() {
            const answer = document.getElementById('current-answer').value.trim().toLowerCase();
            const room = rooms[currentRoomIndex];
            const messageElement = document.getElementById('message');
            
            if (answer === room.correctAnswer.toLowerCase()) {
                messageElement.textContent = '正確！門鎖已解開，進入下一關。';
                messageElement.className = 'message success';
                
                setTimeout(() => {
                    currentRoomIndex++;
                    updateProgress(currentRoomIndex);
                    
                    if (currentRoomIndex >= rooms.length) {
                        // 遊戲完成
                        clearInterval(timerInterval);
                        const endTime = new Date();
                        const timeUsed = Math.floor((endTime - startTime) / 1000);
                        const minutes = Math.floor(timeUsed / 60);
                        const seconds = timeUsed % 60;
                        
                        document.getElementById('time-used').textContent = 
                            `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                        showRoom('final');
                    } else {
                        // 下一關
                        loadRoom(currentRoomIndex);
                    }
                }, 1500);
            } else {
                messageElement.textContent = '答案不正確，請再試一次。';
                messageElement.className = 'message error';
            }
        }
        
        // 重新開始遊戲
        function restartGame() {
            clearInterval(timerInterval);
            secondsLeft = 1200;
            document.getElementById('timer').textContent = '20:00';
            document.getElementById('start-input').value = '';
            updateProgress(0);
            showRoom('intro');
        }
    </script>
</body>
</html>
